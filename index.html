<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Weather App</title>
    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="style.css" />
    <!-- Link to website favicon -->
    <link rel="shortcut icon" href="favicon.jpg" type="image/x-icon" />
  </head>
  <body>
    <!-- Main container for the app -->
    <div class="container">
      <!-- Header with the app title -->
      <h1>Weather App</h1>
      <!-- Form for getting user input -->
      <form>
        <input type="text" id="city" placeholder="Enter city name" />
        <button type="button" id="submitBtn">Get weather</button>
      </form>
      <!-- Container for displaying weather information -->
      <div id="weatherInfo"></div>
    </div>
    <!-- JavaScript file for app functionality -->
    <script src="script.js"></script>
  </body>
</html>
